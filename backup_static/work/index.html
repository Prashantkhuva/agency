<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Work | Let’em Know®</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../assets/js/tailwind.config.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&amp;family=Hanken+Grotesk:wght@100..900&amp;family=JetBrains+Mono:wght@100..800&amp;display=swap"
      rel="stylesheet"
    />
    <link href="../assets/css/styles.css" rel="stylesheet" />
  </head>
  <body
    class="font-body-md bg-background-paper selection:bg-accent-bronze selection:text-background-paper"
  >
    <div id="custom-cursor"><span class="cursor-label"></span></div>

    <header
      class="fixed top-0 left-0 w-full z-50 bg-surface/90 backdrop-blur-md flex justify-between items-center px-margin-edge py-stack-md"
    >
      <a
        class="font-headline-lg text-headline-lg tracking-tighter text-text-ink leading-none"
        href="../"
        >Let’em Know®</a
      >
      <nav class="hidden lg:flex gap-stack-lg items-center">
        <a class="nav-link is-active" href="./">Work</a>
        <a class="nav-link" href="../about/">About</a>
        <a class="nav-link" href="../contact/">Contact</a>
      </nav>
      <div class="flex items-center gap-6">
        <a class="nav-cta" href="../contact/">Inquire</a>
        <!-- Hamburger Toggle Button (Mobile/Tablet Only) -->
        <button class="hamburger-btn flex lg:hidden flex-col justify-between w-6 h-3.5 z-50 focus:outline-none cursor-pointer" aria-label="Toggle Navigation Menu">
          <span class="hamburger-line w-full h-[1.5px] bg-text-ink origin-center transition-all duration-300"></span>
          <span class="hamburger-line w-full h-[1.5px] bg-text-ink origin-center transition-all duration-300"></span>
          <span class="hamburger-line w-full h-[1.5px] bg-text-ink origin-center transition-all duration-300"></span>
        </button>
      </div>
    </header>

    <!-- Mobile Fullscreen Overlay Navigation -->
    <div class="mobile-menu-overlay fixed inset-0 z-40 bg-surface/98 backdrop-blur-xl flex flex-col justify-center px-margin-edge transition-all duration-500 opacity-0 pointer-events-none">
      <nav class="flex flex-col gap-6">
        <a class="mobile-nav-link font-display-xl text-4xl sm:text-5xl tracking-tighter text-text-ink hover:text-accent-bronze transition-colors opacity-0 translate-y-8" href="./">Work</a>
        <a class="mobile-nav-link font-display-xl text-4xl sm:text-5xl tracking-tighter text-text-ink hover:text-accent-bronze transition-colors opacity-0 translate-y-8" href="../about/">About</a>
        <a class="mobile-nav-link font-display-xl text-4xl sm:text-5xl tracking-tighter text-text-ink hover:text-accent-bronze transition-colors opacity-0 translate-y-8" href="../contact/">Contact</a>
      </nav>
      <div class="mt-12 border-t border-text-ink/10 pt-6 flex flex-col gap-2.5 opacity-0 translate-y-8 mobile-menu-footer">
        <span class="font-label-mono text-label-mono uppercase text-accent-bronze">Say Hello</span>
        <a class="font-headline-lg-italic italic text-2xl text-text-ink hover:text-accent-bronze transition-all" href="mailto:hello@letemknow.agency">hello@letemknow.agency</a>
      </div>
    </div>

    <main>
      <section class="page-hero px-margin-edge pt-40 pb-section-gap">
        <span
          class="font-label-mono text-label-mono uppercase text-accent-bronze mb-stack-lg block reveal-up"
          >Selected Work</span
        >
        <h1
          class="font-display-xl text-display-xl tracking-tighter leading-[0.9] max-w-6xl reveal-up"
        >
          Campaigns with memory.
        </h1>
        <div class="mt-stack-lg flex flex-wrap gap-stack-sm reveal-up">
          <button class="filter-button is-active" data-filter="all">All</button>
          <button class="filter-button" data-filter="campaign">Campaigns</button>
          <button class="filter-button" data-filter="identity">Identity</button>
          <button class="filter-button" data-filter="founder">Founder</button>
          <button class="filter-button" data-filter="content">Content</button>
        </div>
      </section>

      <section class="px-margin-edge pb-section-gap">
        <div class="work-grid">
          <article
            class="project-card work-card work-card-large reveal-up"
            data-category="campaign"
            data-title="Chai, Camera, Conversion"
            data-meta="Campaign System / D2C Food"
            data-desc="A scroll-native campaign system built around rituals, product truth, and creator-led repetition."
            data-img="https://images.unsplash.com/photo-1556761175-b413da4baf72?auto=format&amp;fit=crop&amp;q=85&amp;w=1600"
          >
            <button class="project-preview-trigger" type="button">
              <img
                alt="Campaign planning table with creative team"
                src="https://images.unsplash.com/photo-1556761175-b413da4baf72?auto=format&amp;fit=crop&amp;q=85&amp;w=1600"
              />
              <span>01 / Campaign</span>
              <h2>Chai, Camera, Conversion</h2>
            </button>
          </article>

          <article
            class="project-card work-card reveal-up"
            data-category="founder"
            data-title="Face First Brand Building"
            data-meta="Founder Content / Personal Brand"
            data-desc="A content language for a founder who needed presence without performance-theatre."
            data-img="https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&amp;fit=crop&amp;q=85&amp;w=1400"
          >
            <button class="project-preview-trigger" type="button">
              <img
                alt="Founder content planning with laptops"
                src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&amp;fit=crop&amp;q=85&amp;w=1400"
              />
              <span>02 / Founder</span>
              <h2>Face First Brand Building</h2>
            </button>
          </article>

          <article
            class="project-card work-card reveal-up"
            data-category="identity"
            data-title="The Everyday Drop"
            data-meta="Identity / Street Retail"
            data-desc="A retail identity system designed to feel local, repeatable, and instantly recognizable."
            data-img="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&amp;fit=crop&amp;q=85&amp;w=1400"
          >
            <button class="project-preview-trigger" type="button">
              <img
                alt="Fashion campaign street portrait"
                src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&amp;fit=crop&amp;q=85&amp;w=1400"
              />
              <span>03 / Identity</span>
              <h2>The Everyday Drop</h2>
            </button>
          </article>

          <article
            class="project-card work-card work-card-wide reveal-up"
            data-category="content"
            data-title="Reels With a Spine"
            data-meta="Content Engine / Creator Studio"
            data-desc="A repeatable reel format system that protected taste while increasing output."
            data-img="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&amp;fit=crop&amp;q=85&amp;w=1600"
          >
            <button class="project-preview-trigger" type="button">
              <img
                alt="Creators collaborating around laptops"
                src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&amp;fit=crop&amp;q=85&amp;w=1600"
              />
              <span>04 / Content</span>
              <h2>Reels With a Spine</h2>
            </button>
          </article>
        </div>
      </section>
    </main>

    <div class="project-modal" aria-hidden="true">
      <button class="project-modal-close" type="button">Close</button>
      <img alt="" class="project-modal-img" src="" />
      <div class="project-modal-copy">
        <span class="project-modal-meta"></span>
        <h2 class="project-modal-title"></h2>
        <p class="project-modal-desc"></p>
      </div>
    </div>

    <footer
      class="bg-background-paper w-full py-stack-lg flex flex-col md:flex-row justify-between items-start md:items-end px-margin-edge gap-gutter-grid"
    >
      <p class="font-label-mono text-label-mono uppercase text-text-muted">
        © 2026 Let’em Know® / Work
      </p>
      <a class="nav-link" href="../contact/">Start a Project</a>
    </footer>

    <script src="../node_modules/gsap/dist/gsap.min.js"></script>
    <script src="../node_modules/gsap/dist/CustomEase.min.js"></script>
    <script src="../node_modules/gsap/dist/ScrollTrigger.min.js"></script>
    <script src="../node_modules/@studio-freight/lenis/dist/lenis.umd.js"></script>
    <script src="../node_modules/split-type/umd/index.min.js"></script>
    <script src="../assets/js/components.js"></script>
  </body>
</html>
